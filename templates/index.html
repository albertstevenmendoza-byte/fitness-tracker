<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d0d">
  <title>Shredded — Fitness Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- ── Top bar ─────────────────────────────────────────────── -->
  <header class="top-bar">
    <div class="top-bar__phase" id="topPhaseLabel">PHASE 1</div>
    <div class="top-bar__title" id="topTitle">SHREDDED</div>
    <div class="top-bar__date" id="topDate"></div>
  </header>

  <!-- ── Main content ────────────────────────────────────────── -->
  <main class="main" id="mainContent">

    <!-- DASHBOARD -->
    <section class="tab-section active" id="tab-dashboard">
      <div class="phase-hero" id="phaseHero"></div>
      <div class="dash-grid" id="dashGrid"></div>
      <div class="section-heading">SELECT PHASE</div>
      <div class="phase-selector" id="phaseSelector"></div>
      <div class="section-heading">TODAY AT A GLANCE</div>
      <div class="glance-cards" id="glanceCards"></div>
    </section>

    <!-- MEALS -->
    <section class="tab-section" id="tab-meals">
      <div class="macro-ring-wrap" id="macroRingWrap"></div>
      <div class="macro-bars" id="macroBars"></div>
      <div class="section-heading">TODAY'S MEALS</div>
      <div class="meal-list" id="mealList"></div>
    </section>

    <!-- WORKOUT -->
    <section class="tab-section" id="tab-workout">
      <div class="workout-selector" id="workoutSelector"></div>
      <div class="workout-session" id="workoutSession" style="display:none"></div>
    </section>

    <!-- PROGRESS -->
    <section class="tab-section" id="tab-progress">
      <div class="progress-upload" id="progressUpload"></div>
      <div class="section-heading">PHOTO LOG</div>
      <div class="photo-grid" id="photoGrid"></div>
    </section>

    <!-- GROCERY -->
    <section class="tab-section" id="tab-grocery">
      <div class="grocery-header" id="groceryHeader"></div>
      <div class="grocery-body" id="groceryBody"></div>
    </section>

  </main>

  <!-- ── Bottom nav ──────────────────────────────────────────── -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="dashboard" onclick="App.switchTab('dashboard', this)">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>HOME</span>
    </button>
    <button class="nav-btn" data-tab="meals" onclick="App.switchTab('meals', this)">
      <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      <span>MEALS</span>
    </button>
    <button class="nav-btn" data-tab="workout" onclick="App.switchTab('workout', this)">
      <svg viewBox="0 0 24 24"><path d="M6.5 6.5h11"/><path d="M6.5 17.5h11"/><path d="M3 9.5h3"/><path d="M3 14.5h3"/><path d="M18 9.5h3"/><path d="M18 14.5h3"/><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      <span>LIFT</span>
    </button>
    <button class="nav-btn" data-tab="progress" onclick="App.switchTab('progress', this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span>PROGRESS</span>
    </button>
    <button class="nav-btn" data-tab="grocery" onclick="App.switchTab('grocery', this)">
      <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span>GROCERY</span>
    </button>
  </nav>

  <script src="/static/app.js"></script>
</body>
</html>
