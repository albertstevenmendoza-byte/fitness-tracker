  // ── Dashboard ──────────────────────────────────────────────
  renderDashboard(){
    const p=PHASES[State.phase];
    document.getElementById('phaseHero').innerHTML=`<div class="phase-hero__label">PHASE ${State.phase} · ${p.weeks}</div><div class="phase-hero__name">${p.shortName}</div><div class="phase-hero__desc">${p.desc}</div>`;
    const t=p.targets;
    document.getElementById('dashGrid').innerHTML=`
      <div class="stat-card stat-card--red"><div class="stat-card__label">CALORIES</div><div class="stat-card__val">${t.cal}<span class="stat-card__unit">cal</span></div></div>
      <div class="stat-card stat-card--green"><div class="stat-card__label">PROTEIN</div><div class="stat-card__val">${t.protein}<span class="stat-card__unit">g</span></div></div>
      <div class="stat-card stat-card--blue"><div class="stat-card__label">TRAINING</div><div class="stat-card__val" style="font-size:15px;margin-top:4px">${p.training}</div></div>
      <div class="stat-card stat-card--gold"><div class="stat-card__label">INTENSITY</div><div class="stat-card__val" style="font-size:17px;margin-top:4px">${p.rpe}</div></div>`;
    document.getElementById('phaseSelector').innerHTML=[1,2,3].map(n=>{const ph=PHASES[n];return`<button class="phase-btn ${State.phase===n?'selected':''}" onclick="App.setPhase(${n})"><div class="phase-btn__num">${n}</div><div><div class="phase-btn__name">${ph.shortName}</div><div class="phase-btn__meta">${ph.weeks} · ${ph.targets.cal} cal/day</div></div><div class="phase-btn__check"><svg viewBox="0 0 24 24" width="12" height="12" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></button>`}).join('');
    const mealsCompleted=Object.values(State.mealLogs).filter(Boolean).length;
    const totalMeals=PHASES[State.phase].meals.length;
    const setsToday=Object.values(State.sessionSets).reduce((a,s)=>a+s.length,0);
    const lastBody=State.bodyEntries[0];
    document.getElementById('glanceCards').innerHTML=`
      <div class="glance-item"><div class="glance-icon"><svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg></div><div class="glance-text"><div class="glance-label">MEALS TODAY</div><div class="glance-val">${mealsCompleted} of ${totalMeals} completed</div></div>${mealsCompleted===totalMeals?'<div class="glance-check">✓</div>':''}</div>
      <div class="glance-item"><div class="glance-icon"><svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/><path d="M6.5 6.5h11"/><path d="M6.5 17.5h11"/><path d="M3 9.5h3"/><path d="M3 14.5h3"/><path d="M18 9.5h3"/><path d="M18 14.5h3"/></svg></div><div class="glance-text"><div class="glance-label">SETS LOGGED</div><div class="glance-val">${setsToday} sets today${State.todayWorkout?' · '+State.todayWorkout:''}</div></div>${setsToday>0?'<div class="glance-check">✓</div>':''}</div>
      <div class="glance-item"><div class="glance-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="glance-text"><div class="glance-label">LAST WEIGH-IN</div><div class="glance-val">${lastBody?lastBody.weight+' lbs · '+formatDate(lastBody.date):'No entries yet'}</div></div></div>`;
  },

  setPhase(n){State.phase=n;State.mealLogs={};State.mealOptions={};Store.set('phase',n);this.updateHeader();this.renderDashboard();this.renderMeals();this.renderWorkout();toast('Switched to Phase '+n)},

  // ── Meals ──────────────────────────────────────────────────
  renderMeals(){
    const p=PHASES[State.phase],t=p.targets,meals=p.meals;
    let totCal=0,totP=0,totC=0,totF=0;
    meals.forEach((m,i)=>{
      if(State.mealLogs[i]){
        const opt=m.options[State.mealOptions[i]||0];
        totCal+=opt.cal;totP+=opt.protein;totC+=opt.carbs;totF+=opt.fat;
      }
    });
    const r=34,circ=2*Math.PI*r,offset=circ-(pct(totCal,t.cal)/100)*circ;
    document.getElementById('macroRingWrap').innerHTML=`<div class="macro-ring"><svg viewBox="0 0 88 88"><circle class="macro-ring__track" cx="44" cy="44" r="${r}"/><circle class="macro-ring__fill" cx="44" cy="44" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/></svg><div class="macro-ring__center"><div class="macro-ring__cal">${totCal}</div><div class="macro-ring__label">/ ${t.cal}</div></div></div><div class="macro-stats">${this._macroBar('PROTEIN',totP,t.protein,'#3d5a3e')}${this._macroBar('CARBS',totC,t.carbs,'#3a5068')}${this._macroBar('FAT',totF,t.fat,'#7a5010')}</div>`;
    document.getElementById('macroBars').innerHTML=`<div class="macro-pill macro-pill--p"><div class="macro-pill__val">${totP}g</div><div class="macro-pill__name">PROTEIN</div></div><div class="macro-pill macro-pill--c"><div class="macro-pill__val">${totC}g</div><div class="macro-pill__name">CARBS</div></div><div class="macro-pill macro-pill--f"><div class="macro-pill__val">${totF}g</div><div class="macro-pill__name">FAT</div></div>`;
    document.getElementById('mealList').innerHTML=meals.map((m,i)=>{
      const done=!!State.mealLogs[i];
      const selOpt=State.mealOptions[i]||0;
      const opt=m.options[selOpt];
      const lbl=m.label==='post'?'<span class="label-tag">POST-WORKOUT</span>':m.label==='pre'?'<span class="label-tag pre">PRE-WORKOUT</span>':'';
      const tabs=m.options.map((o,oi)=>`<div class="meal-opt-tab ${oi===selOpt?'active':''}" onclick="App.selectMealOption(event,${i},${oi})">${oi+1}. ${o.name}</div>`).join('');
      const items=opt.items.map(it=>it.name.startsWith('↳')||it.name.startsWith('──')?`<div style="font-size:11px;color:#6c4824;padding:4px 0;font-family:'Space Mono',monospace">${it.name}</div>`:`<div class="meal-item-row"><span class="meal-item-name">${it.name}</span><span class="meal-item-macro">${it.macro}</span></div>`).join('');
      return`<div class="meal-card ${done?'done':''}" id="mc${i}">
        <div class="meal-card__header" onclick="App.expandMeal(${i})">
          <div class="meal-card__checkbox" onclick="App.toggleMeal(event,${i})"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="meal-card__info">
            <div class="meal-card__time">${m.time}</div>
            <div class="meal-card__name">${opt.name}</div>
            <div class="meal-card__cal">${opt.cal} cal · ${opt.protein}g P</div>
          </div>
          ${lbl}
          <div class="meal-card__expand"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
        </div>
        <div class="meal-card__body">
          <div class="meal-options-tabs">${tabs}</div>
          <div class="meal-opt-macros">
            <span class="meal-opt-macro meal-opt-macro--p">${opt.protein}g P</span>
            <span class="meal-opt-macro meal-opt-macro--c">${opt.carbs}g C</span>
            <span class="meal-opt-macro meal-opt-macro--f">${opt.fat}g F</span>
            <span class="meal-opt-macro meal-opt-macro--cal">${opt.cal} kcal</span>
          </div>
          ${items}
        </div>
      </div>`;
    }).join('');
  },
  _macroBar(name,val,max,color){return`<div class="macro-stat"><div class="macro-stat__dot" style="background:${color}"></div><div class="macro-stat__name">${name}</div><div class="macro-stat__bar"><div class="macro-stat__fill" style="width:${pct(val,max)}%;background:${color}"></div></div><div class="macro-stat__nums">${val}/${max}g</div></div>`},
  expandMeal(i){document.getElementById('mc'+i).classList.toggle('open')},
  selectMealOption(e,mealIdx,optIdx){
    e.stopPropagation();
    State.mealOptions[mealIdx]=optIdx;
    Store.set('mealOptions:'+today(),State.mealOptions);
    this.renderMeals();
    // Keep card open after switching option
    setTimeout(()=>document.getElementById('mc'+mealIdx)?.classList.add('open'),10);
  },
  toggleMeal(e,i){
    e.stopPropagation();
    State.mealLogs[i]=!State.mealLogs[i];
    Store.set('meals:'+today(),State.mealLogs);
    this.renderMeals();this.renderDashboard();
    if(State.mealLogs[i])toast('Meal logged ✓');
  },

  // ── Workout ────────────────────────────────────────────────
  renderWorkout(){
    const p=PHASES[State.phase];
    if(State.todayWorkout){document.getElementById('workoutSelector').style.display='none';document.getElementById('workoutSession').style.display='block';this._renderSession();return}
    document.getElementById('workoutSession').style.display='none';
    document.getElementById('workoutSelector').style.display='block';
    document.getElementById('workoutSelector').innerHTML=`
      <div class="prog-rules-card">
        <div class="prog-rules-title"><span>📈</span> PROGRESSIVE OVERLOAD RULES</div>
        <div class="prog-rules-grid"><div class="prog-rule-item"><div class="prog-rule-label">UPPER BODY</div><div class="prog-rule-val">+5 lbs</div><div class="prog-rule-desc">bench, press, row, pull</div></div><div class="prog-rule-item"><div class="prog-rule-label">LOWER BODY</div><div class="prog-rule-val">+10 lbs</div><div class="prog-rule-desc">squat, deadlift, leg work</div></div></div>
        <div class="prog-rules-when"><strong>When:</strong> Hit ALL sets at the TOP of the rep range → add weight next session. Miss reps → repeat same weight.</div>
        <div class="prog-rules-stall"><strong>Stalled 3+ sessions?</strong> Drop 10–15%, rebuild. Or take a deload week (50% volume, 70% weight).</div>
      </div>
      <div class="workout-selector__heading" style="margin-top:16px">SELECT TODAY'S WORKOUT — PHASE ${State.phase} · ${p.rpe}</div>
      <div class="workout-day-grid">${p.workouts.map(w=>`<button class="workout-day-btn" onclick="App.startWorkout('${w.key}')"><div class="workout-day-btn__day">${w.day}</div><div class="workout-day-btn__name">${w.name}</div><div class="workout-day-btn__rpe">${w.rpe} · ${w.focus}</div></button>`).join('')}</div>
      <p class="text-muted" style="text-align:center;margin-top:8px;font-size:12px">RPE = Rate of Perceived Exertion · RPE 8 = 2 reps left in the tank</p>`;
  },

  startWorkout(key){
    State.todayWorkout=key;
    const w=PHASES[State.phase].workouts.find(x=>x.key===key);
    w.exercises.forEach(ex=>{if(!State.exerciseHistory[ex.name])State.exerciseHistory[ex.name]=Store.get('history:'+ex.name,[])});
    document.getElementById('workoutSelector').style.display='none';
    document.getElementById('workoutSession').style.display='block';
    this._renderSession();
  },

  _renderSession(){
    const w=PHASES[State.phase].workouts.find(x=>x.key===State.todayWorkout);
    if(!w)return;
    document.getElementById('workoutSession').innerHTML=`<div class="session-header"><button class="session-back" onclick="App.endWorkout()"><svg viewBox="0 0 24 24" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg></button><div class="session-title">${w.name}</div><span class="tag tag-red">${w.rpe}</span></div>${w.exercises.map((ex,ei)=>this._exerciseCard(ex,ei)).join('')}`;
  },

  _exerciseCard(ex,ei){
    const sets=State.sessionSets[ex.name]||[];
    const pr=State.prs[ex.name];
    const prog=getProgression(ex.name,ex.prescribed);
    const inc=isLower(ex.name)?10:5;
    const recColor=prog.type==='increase'?'#1e3e14':prog.type==='new'?'#7a5010':'#1a3050';
    const recIcon=prog.type==='increase'?'↑':prog.type==='new'?'★':'→';
    let lastHtml='';
    if(prog.lastSession){
      const ls=prog.lastSession;
      const setsText=ls.sets.map(s=>`<span class="ls-set">${s.weight??'–'}×${s.reps??'–'}</span>`).join('');
      lastHtml=`<div class="last-session"><div class="last-session__header"><span class="last-session__label">LAST SESSION</span><span class="last-session__date">${formatDate(ls.date)}</span><button class="hist-btn" onclick="App.showHistory('${ex.name.replace(/'/g,"\\'")}')">History</button></div><div class="last-session__sets">${setsText}</div></div>`;
    }
    const recHtml=`<div class="rec-card" style="border-left-color:${recColor}"><div class="rec-card__top"><span class="rec-icon" style="color:${recColor}">${recIcon}</span><span class="rec-card__msg">${prog.message}</span></div><div class="rec-card__detail"><span class="rec-detail-item"><span style="color:#6c4824">INCREMENT</span><strong>${inc} lbs</strong></span>${pr?`<span class="rec-detail-item"><span style="color:#6c4824">YOUR PR</span><strong style="color:#7a5010">${pr.weight} lbs</strong></span>`:''}<span class="rec-detail-item"><span style="color:#6c4824">TARGET</span><strong>${ex.prescribed}</strong></span></div></div>`;
    const open=State.openExercises.has(ei);
    return`<div class="exercise-card ${open?'open':''}" id="exc${ei}"><div class="exercise-header" onclick="App.toggleExercise(${ei})"><div class="exercise-num">${ei+1}</div><div><div class="exercise-name">${ex.name}${pr&&sets.some(s=>s.weight>=pr.weight)?'<span class="pr-badge">PR 🏆</span>':''}</div><div class="exercise-prescribed">${ex.prescribed} · ${ex.rpe}</div></div><div class="exercise-sets-done">${sets.length>0?sets.length+' sets':''}</div></div><div class="exercise-body">${lastHtml}${recHtml}${sets.length>0?`<div class="set-log-header"><div>#</div><div>Weight</div><div>Reps</div><div>RPE</div><div></div></div>${sets.map((s,si)=>`<div class="set-row"><div class="set-num">${si+1}</div><div>${s.weight??'–'} lbs</div><div>${s.reps??'–'}</div><div>${s.rpe??'–'}</div><div class="set-del" onclick="App.deleteSet(${s.id},'${ex.name.replace(/'/g,"\\'")}',${ei})">×</div></div>`).join('')}`:''}<div class="set-input-section"><div class="set-input-top-row"><div class="set-input-group"><label>Weight (lbs)</label><div class="set-input-wrap"><button class="set-spinner" onclick="event.preventDefault();App.spin('w${ei}',-${inc})">−</button><input type="text" id="w${ei}" class="set-input-field" value="${prog.suggestedWeight??''}" placeholder="${prog.suggestedWeight??'lbs'}" inputmode="decimal" pattern="[0-9.]*" autocomplete="off"><button class="set-spinner" onclick="event.preventDefault();App.spin('w${ei}',${inc})">+</button></div></div><div class="set-input-group"><label>Reps</label><div class="set-input-wrap"><button class="set-spinner" onclick="event.preventDefault();App.spin('r${ei}',-1)">−</button><input type="text" id="r${ei}" class="set-input-field" placeholder="8" inputmode="numeric" pattern="[0-9]*" autocomplete="off"><button class="set-spinner" onclick="event.preventDefault();App.spin('r${ei}',1)">+</button></div></div></div><div class="set-input-group set-input-rpe"><label>RPE (1–10 effort scale)</label><div class="set-input-wrap"><button class="set-spinner" onclick="event.preventDefault();App.spinHalf('rpe${ei}',-0.5)">−</button><input type="text" id="rpe${ei}" class="set-input-field" placeholder="7" inputmode="decimal" pattern="[0-9.]*" autocomplete="off"><button class="set-spinner" onclick="event.preventDefault();App.spinHalf('rpe${ei}',0.5)">+</button></div></div></div><button class="log-set-btn" onclick="App.logSet('${ex.name.replace(/'/g,"\\'")}',${ei})"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>LOG SET ${sets.length+1}</button></div></div>`;
  },

  toggleExercise(ei){
    const card=document.getElementById('exc'+ei);
    if(card.classList.contains('open')){
      card.classList.remove('open');
      State.openExercises.delete(ei);
    } else {
      card.classList.add('open');
      State.openExercises.add(ei);
    }
  },
  spin(id,d){
    const el=document.getElementById(id);
    const val=parseFloat(el.value)||0;
    el.value=Math.max(0,val+d);
  },
  spinHalf(id,d){
    const el=document.getElementById(id);
    const val=parseFloat(el.value)||0;
    el.value=Math.max(0,Math.min(10,+(val+d).toFixed(1)));
  },

  logSet(name,ei){
    const weight=parseFloat(document.getElementById('w'+ei).value)||null;
    const reps=parseInt(document.getElementById('r'+ei).value)||null;
    const rpe=parseFloat(document.getElementById('rpe'+ei).value)||null;
    const id=Date.now();
    const s={id,workoutKey:State.todayWorkout,exerciseName:name,setNumber:(State.sessionSets[name]||[]).length+1,weight,reps,rpe};
    if(!State.sessionSets[name])State.sessionSets[name]=[];
    State.sessionSets[name].push(s);
    Store.set('sets:'+today(),Object.values(State.sessionSets).flat());
    const hist=State.exerciseHistory[name]||[];
    let todayEntry=hist.find(h=>h.date===today());
    if(!todayEntry){todayEntry={date:today(),sets:[]};hist.unshift(todayEntry)}
    todayEntry.sets.push({weight,reps,rpe,set_number:s.setNumber});
    State.exerciseHistory[name]=hist;
    Store.set('history:'+name,hist.slice(0,10));
    if(weight&&(!State.prs[name]||weight>State.prs[name].weight)){State.prs[name]={weight,date:today()};Store.set('prs',State.prs);toast('🏆 New PR! '+weight+' lbs on '+name)}
    else toast('Set '+s.setNumber+' logged ✓');
    // Start rest timer — duration based on RPE and exercise type
    const restSecs = Timer.recommendRest(rpe||7, isLower(name));
    Timer.start(restSecs);
    State.openExercises.clear();
    State.openExercises.add(ei);
    this._renderSession();this.renderDashboard();
  },

  deleteSet(id,name,ei){
    State.sessionSets[name]=(State.sessionSets[name]||[]).filter(s=>s.id!==id);
    Store.set('sets:'+today(),Object.values(State.sessionSets).flat());
    const hist=State.exerciseHistory[name]||[];
    const te=hist.find(h=>h.date===today());
    if(te){te.sets=(State.sessionSets[name]||[]).map((s,i)=>({weight:s.weight,reps:s.reps,rpe:s.rpe,set_number:i+1}));Store.set('history:'+name,hist.slice(0,10))}
    State.openExercises.add(ei);
    this._renderSession();toast('Set removed');
  },

  endWorkout(){
    if(Object.values(State.sessionSets).some(s=>s.length>0)&&!confirm('End workout? Sets are saved.'))return;
    State.todayWorkout=null;State.sessionSets={};State.openExercises.clear();
    this.renderWorkout();this.renderDashboard();
  },

  showHistory(name){
    if(!State.exerciseHistory[name])State.exerciseHistory[name]=Store.get('history:'+name,[]);
    const hist=State.exerciseHistory[name]||[];
    const pr=State.prs[name];
    let modal=document.getElementById('histModal');
    if(!modal){modal=document.createElement('div');modal.id='histModal';modal.className='hist-modal-overlay';modal.innerHTML=`<div class="hist-modal"><div class="hist-modal__header"><div class="hist-modal__title" id="histModalTitle"></div><button class="hist-modal__close" onclick="App.closeHistory()">×</button></div><div class="hist-modal__pr" id="histModalPR"></div><div class="hist-modal__body" id="histModalBody"></div></div>`;document.body.appendChild(modal)}
    document.getElementById('histModalTitle').textContent=name;
    document.getElementById('histModalPR').innerHTML=pr?`<div class="pr-banner">🏆 Personal Record: <strong>${pr.weight} lbs</strong> on ${formatDate(pr.date)}</div>`:`<div class="pr-banner pr-banner--empty">No PR yet — start logging to track progress.</div>`;
    document.getElementById('histModalBody').innerHTML=hist.length===0?`<div style="text-align:center;color:#6c4824;padding:32px 0">No history yet.</div>`:hist.map(session=>{const maxW=Math.max(...session.sets.map(s=>s.weight||0));const isPR=pr&&maxW>=pr.weight;return`<div class="hist-session"><div class="hist-session__header"><span class="hist-session__date">${formatDate(session.date)}</span>${isPR?'<span class="pr-badge">PR 🏆</span>':''}</div><div class="hist-session__sets">${session.sets.map((s,i)=>`<div class="hist-set-row"><span class="hist-set-num">Set ${i+1}</span><span class="hist-set-weight">${s.weight??'–'} lbs</span><span class="hist-set-reps">${s.reps??'–'} reps</span><span class="hist-set-rpe">${s.rpe?'RPE '+s.rpe:''}</span></div>`).join('')}</div></div>`}).join('');
    modal.classList.add('open');
  },
  closeHistory(){document.getElementById('histModal')?.classList.remove('open')},

  // ── Body Tracker ───────────────────────────────────────────
  renderBody(){
    const entries=State.bodyEntries;
    // Trend card
    let trendHtml='';
    if(entries.length>=2){
      const latest=entries[0],prev=entries[1];
      const wDelta=latest.weight&&prev.weight?(latest.weight-prev.weight).toFixed(1):null;
      const wsDelta=latest.waist&&prev.waist?(latest.waist-prev.waist).toFixed(2):null;
      trendHtml=`<div class="body-trend-card">
        <div class="body-trend-item"><div class="body-trend-label">CURRENT WEIGHT</div><div class="body-trend-val">${latest.weight??'–'}<span style="font-size:14px;color:#6c4824"> lbs</span></div>${wDelta!==null?`<div class="body-trend-delta ${wDelta<0?'delta-down':wDelta>0?'delta-up':'delta-same'}">${wDelta>0?'+':''}${wDelta} lbs</div>`:''}</div>
        <div class="body-trend-item"><div class="body-trend-label">CURRENT WAIST</div><div class="body-trend-val">${latest.waist??'–'}<span style="font-size:14px;color:#6c4824"> in</span></div>${wsDelta!==null?`<div class="body-trend-delta ${wsDelta<0?'delta-down':wsDelta>0?'delta-up':'delta-same'}">${wsDelta>0?'+':''}${wsDelta} in</div>`:''}</div>
      </div>`;
    } else if(entries.length===1){
      const e=entries[0];
      trendHtml=`<div class="body-trend-card"><div class="body-trend-item"><div class="body-trend-label">CURRENT WEIGHT</div><div class="body-trend-val">${e.weight??'–'}<span style="font-size:14px;color:#6c4824"> lbs</span></div></div><div class="body-trend-item"><div class="body-trend-label">CURRENT WAIST</div><div class="body-trend-val">${e.waist??'–'}<span style="font-size:14px;color:#6c4824"> in</span></div></div></div>`;
    }
    document.getElementById('bodyTrend').innerHTML=trendHtml;
    document.getElementById('bodyHistory').innerHTML=entries.length===0
      ?`<div style="text-align:center;color:#6c4824;padding:32px 0;font-size:14px">No entries yet. Log your first stats above.</div>`
      :entries.map((e,i)=>`<div class="body-entry"><div class="body-entry__date">${formatDate(e.date)}</div><div class="body-entry__stats">${e.weight?`<span class="body-entry__stat">${e.weight} lbs</span>`:''} ${e.waist?`<span class="body-entry__stat" style="color:#3c2010">${e.waist}" waist</span>`:''} ${e.chest?`<span class="body-entry__stat" style="color:#6c4824">${e.chest}" chest</span>`:''} ${e.arms?`<span class="body-entry__stat" style="color:#6c4824">${e.arms}" arms</span>`:''}</div><div class="body-entry__del" onclick="App.deleteBody(${i})">×</div></div>`).join('');
  },

  logBody(){
    const weight=parseFloat(document.getElementById('bodyWeight').value)||null;
    const waist=parseFloat(document.getElementById('bodyWaist').value)||null;
    const chest=parseFloat(document.getElementById('bodyChest').value)||null;
    const arms=parseFloat(document.getElementById('bodyArms').value)||null;
    if(!weight&&!waist){toast('Enter at least weight or waist');return}
    const entry={date:today(),weight,waist,chest,arms};
    // Replace today's entry if it already exists
    if(State.bodyEntries.length&&State.bodyEntries[0].date===today())State.bodyEntries.shift();
    State.bodyEntries.unshift(entry);
    Store.set('body',State.bodyEntries);
    ['bodyWeight','bodyWaist','bodyChest','bodyArms'].forEach(id=>{document.getElementById(id).value=''});
    this.renderBody();this.renderDashboard();
    toast('Stats logged ✓');
  },

  deleteBody(i){
    if(!confirm('Delete this entry?'))return;
    State.bodyEntries.splice(i,1);
    Store.set('body',State.bodyEntries);
    this.renderBody();this.renderDashboard();
    toast('Entry deleted');
  },

  // ── Grocery ────────────────────────────────────────────────
  renderGrocery(){
    const p=PHASES[State.phase];
    const total=GROCERY.reduce((a,s)=>a+s.items.length,0);
    const checked=Object.values(State.groceryChecks).filter(Boolean).length;
    document.getElementById('groceryHeader').innerHTML=`<div><div class="grocery-header__label">PHASE ${State.phase} · ${p.weeks}</div><div class="grocery-header__title">${checked}/${total} Items</div></div><button class="grocery-reset" onclick="App.resetGrocery()">RESET</button>`;
    document.getElementById('groceryBody').innerHTML=GROCERY.map(sec=>`<div><div class="grocery-section__title">${sec.section}</div><div class="grocery-items">${sec.items.map(item=>`<div class="grocery-item ${State.groceryChecks[item.key]?'checked':''}" onclick="App.toggleGrocery('${item.key}')"><div class="g-check"></div><div class="g-name">${item.name}</div><div class="g-qty">${item.qty}</div></div>`).join('')}</div></div>`).join('');
  },
  toggleGrocery(key){State.groceryChecks[key]=!State.groceryChecks[key];Store.set('grocery',State.groceryChecks);this.renderGrocery()},
  resetGrocery(){if(!confirm('Uncheck all grocery items?'))return;State.groceryChecks={};Store.set('grocery',{});this.renderGrocery();toast('Grocery list reset')},

  // ── Stats ──────────────────────────────────────────────────
  renderStats(){
    const p = PHASES[State.phase];
    const bmr = SciCalc.bmr();
    const tdee = SciCalc.tdee(bmr, 'moderate');
    const macros = SciCalc.macroTargets(147, p.targets.cal, 'recomp');
    const deficit = p.targets.cal - tdee;

    // Exercises with history
    const allEx = new Set();
    [1,2,3].forEach(ph=>PHASES[ph].workouts.forEach(w=>w.exercises.forEach(ex=>allEx.add(ex.name))));
    const exWithHistory = [...allEx].filter(n=>Store.get('history:'+n,[]).length>0);

    // Today session
    const todaySets = Object.values(State.sessionSets).flat();
    const sessionVL = SciCalc.volumeLoad(todaySets);
    const exVolumes = Object.entries(State.sessionSets).map(([name,sets])=>({
      name, vl:SciCalc.volumeLoad(sets), sets:sets.length,
      best1RM:Math.max(0,...sets.filter(s=>s.weight&&s.reps).map(s=>SciCalc.estimated1RM(s.weight,s.reps)||0)),
    })).filter(e=>e.vl>0).sort((a,b)=>b.vl-a.vl);

    // Actuals
    const actuals = SciCalc.dailyActuals(State.mealLogs,State.mealOptions,p.meals);
    const selectedEx = exWithHistory[0]||'';

    // Body entries for chart
    const bodyEntries = State.bodyEntries;

    // Readiness
    const readiness = Store.get('readiness:'+today(),null);
    const readinessScore = readiness ? SciCalc.readinessScore(readiness).score : null;

    document.getElementById('statsHeader').innerHTML=`
      <div class="stats-hero">
        <div class="stats-hero__label">YOUR NUMBERS · PHASE ${State.phase} · MIFFLIN-ST JEOR</div>
        <div class="stats-hero__grid">
          <div class="stats-hero__stat"><div class="stats-hero__val">${bmr}</div><div class="stats-hero__name">BMR (cal)</div></div>
          <div class="stats-hero__stat"><div class="stats-hero__val">${tdee}</div><div class="stats-hero__name">TDEE (cal)</div></div>
          <div class="stats-hero__stat"><div class="stats-hero__val">${macros.protein}g</div><div class="stats-hero__name">PROTEIN 1.9g/kg</div></div>
          <div class="stats-hero__stat"><div class="stats-hero__val" style="color:${deficit<0?'#c89080':'#c8a050'}">${deficit}</div><div class="stats-hero__name">DEFICIT (cal)</div></div>
        </div>
      </div>`;

    document.getElementById('statsContent').innerHTML=`

      <!-- READINESS + SESSION -->
      <div class="stats-section">
        <div class="stats-section-title">Today's Performance</div>
        <div class="stats-grid-2">
          <div class="stat-pill">
            <div class="stat-pill__val gold">${sessionVL.toLocaleString()}</div>
            <div class="stat-pill__name">VOL. LOAD (lbs)</div>
          </div>
          <div class="stat-pill">
            <div class="stat-pill__val ${readinessScore>=4?'green':readinessScore>=3?'gold':'red'}">${readinessScore||'—'}</div>
            <div class="stat-pill__name">READINESS /5</div>
          </div>
          <div class="stat-pill">
            <div class="stat-pill__val ${actuals.cal>=p.targets.cal*0.9?'green':'red'}">${actuals.cal}</div>
            <div class="stat-pill__name">CAL / ${p.targets.cal}</div>
          </div>
          <div class="stat-pill">
            <div class="stat-pill__val ${actuals.protein>=p.targets.protein*0.9?'green':'red'}">${actuals.protein}g</div>
            <div class="stat-pill__name">PROTEIN / ${p.targets.protein}g</div>
          </div>
        </div>
        ${exVolumes.length?`<div class="stats-card"><div class="stats-card__title">Exercise Breakdown</div>${exVolumes.map(e=>`<div class="volume-row"><div class="volume-row__name">${e.name}</div><div style="text-align:right"><div class="volume-row__val">${e.vl.toLocaleString()} lbs</div>${e.best1RM?`<div style="font-family:'Space Mono',monospace;font-size:9px;color:#6c4824">Est. 1RM: ${e.best1RM} lbs</div>`:''}</div></div>`).join('')}</div>`:''}
      </div>

      <!-- WEEKLY MUSCLE VOLUME -->
      <div class="stats-section">
        <div class="stats-section-title">Weekly Muscle Volume Load</div>
        <div class="stats-card">
          <div class="stats-card__title">This Week by Muscle Group</div>
          <div class="chart-wrap"><canvas id="muscleChart"></canvas></div>
        </div>
      </div>

      <!-- STRENGTH TRENDS -->
      <div class="stats-section">
        <div class="stats-section-title">Strength Trends — Brzycki 1RM</div>
        ${exWithHistory.length===0?`<div class="no-data-msg">No exercise history yet.<br>Log workouts to see strength trends.</div>`:`
          <select class="exercise-select" id="exSelect" onchange="App.updateStrengthChart(this.value)">
            ${exWithHistory.map(n=>`<option value="${n}" ${n===selectedEx?'selected':''}>${n}</option>`).join('')}
          </select>
          <div id="plateauAlert" style="margin-bottom:10px"></div>
          <div class="stats-card">
            <div class="stats-card__title" id="strengthChartTitle">Est. 1RM & Volume — ${selectedEx}</div>
            <div class="chart-wrap"><canvas id="strengthChart"></canvas></div>
          </div>`
        }
      </div>

      <!-- NUTRITION TREND -->
      <div class="stats-section">
        <div class="stats-section-title">14-Day Nutrition vs Targets</div>
        <div class="stats-card">
          <div class="stats-card__title">Calories & Protein — Actual vs Target</div>
          <div class="chart-wrap"><canvas id="macroChart"></canvas></div>
        </div>
      </div>

      <!-- BODY WEIGHT TREND -->
      <div class="stats-section">
        <div class="stats-section-title">Body Weight Trend</div>
        <div class="stats-card">
          <div class="stats-card__title">Weight + Linear Trend</div>
          <div class="chart-wrap"><canvas id="bodyWeightChart"></canvas></div>
        </div>
      </div>

      <!-- SCIENTIFIC BASIS -->
      <div class="stats-section">
        <div class="stats-section-title">Calculation Reference</div>
        <div class="stats-card">
          ${[
            ['BMR','Mifflin-St Jeor (1990)'],['TDEE','Harris-Benedict multipliers'],
            ['1RM','Brzycki (1993) ≤10 reps'],['Protein target','1.9g/kg — Helms et al. 2014'],
            ['Volume Load','Sets × Reps × Weight'],['Plateau','3-session rolling 1RM'],
            ['Readiness','Sleep 40% + Soreness 30% + Drive 30%'],['Leucine/meal',`~${macros.leucinePerMeal}g (8.8% of protein)`],
          ].map(([k,v])=>`<div class="volume-row"><div class="volume-row__name">${k}</div><div class="volume-row__val">${v}</div></div>`).join('')}
        </div>
      </div>`;

    setTimeout(()=>{
      Charts.renderMuscleVolumeChart('muscleChart');
      Charts.renderMacroChart('macroChart',State.phase);
      Charts.renderBodyWeightChart('bodyWeightChart',bodyEntries);
      if(selectedEx){
        const plateau=Charts.renderStrengthChart('strengthChart',selectedEx);
        if(plateau&&plateau.status!=='insufficient_data'){
          document.getElementById('plateauAlert').innerHTML=
            `<div class="plateau-badge plateau-badge--${plateau.status==='stall'?'stall':'progress'}">${plateau.status==='stall'?'⚠ PLATEAU DETECTED':'↑ PROGRESSING'}</div> <span style="font-family:'Lora',serif;font-size:12px;color:#6c4824">${plateau.recommendation}</span>`;
        }
      }
    },50);
  },

  updateStrengthChart(name){
    document.getElementById('strengthChartTitle').textContent=`Est. 1RM & Volume — ${name}`;
    document.getElementById('plateauAlert').innerHTML='';
    const plateau=Charts.renderStrengthChart('strengthChart',name);
    if(plateau&&plateau.status!=='insufficient_data'){
      document.getElementById('plateauAlert').innerHTML=
        `<div class="plateau-badge plateau-badge--${plateau.status==='stall'?'stall':'progress'}">${plateau.status==='stall'?'⚠ PLATEAU DETECTED':'↑ PROGRESSING'}</div> <span style="font-family:'Lora',serif;font-size:12px;color:#6c4824">${plateau.recommendation}</span>`;
    }
  },
};

// ── Boot ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  App.init();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
});
</script>

</body>
</html>
